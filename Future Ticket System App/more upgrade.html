<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Bus Station</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* FORM BOX */
.form-box{
    background:white;
    padding:30px;
    width:420px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    color:#243b55;
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#243b55;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#141e30;
}

/* SEATS */
.bus-layout{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:10px;
}

.seat{
    padding:10px;
    text-align:center;
    background:#243b55;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.selected{
    background:#28a745 !important;
}

.booked{
    background:grey !important;
    cursor:not-allowed;
}

/* TICKET PAGE */
.ticket-page{
    display:none;
    background:white;
    padding:30px;
    width:450px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.ticket-page h2{
    text-align:center;
}

/* PRINT FIX */
@media print{
    body *{
        visibility:hidden;
    }
    .ticket-page, .ticket-page *{
        visibility:visible;
    }
    .ticket-page{
        position:absolute;
        left:0;
        top:0;
        width:100%;
    }
    .no-print{
        display:none;
    }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<!-- FORM -->
<div class="form-box" id="formBox">
<h1>🚌 Bus Ticket System</h1>

<form id="ticketForm">

<input type="text" id="name" placeholder="Passenger Name" required>
<input type="number" id="age" placeholder="Age" required>

<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<select id="destination" required>
<option value="">Select Destination</option>
<option value="500">Lahore - Rs 500</option>
<option value="700">Islamabad - Rs 700</option>
<option value="600">Faisalabad - Rs 600</option>
<option value="800">Karachi - Rs 800</option>
</select>

<h3>Select Your Seat</h3>
<div class="bus-layout" id="busLayout"></div>

<button type="submit">Generate Ticket</button>

</form>
</div>

<!-- TICKET PAGE -->
<div class="ticket-page" id="ticketPage">
<h2>🎫 Bus Ticket</h2>
<div id="ticketResult"></div>
<div id="qrcode"></div>

<button class="no-print" onclick="window.print()">Print</button>
<button class="no-print" onclick="goBack()">Back</button>
</div>

<script>

// Seat Setup
let selectedSeat=null;
let busLayout=document.getElementById("busLayout");

for(let i=1;i<=20;i++){
    let seat=document.createElement("div");
    seat.classList.add("seat");
    seat.innerText=i;

    seat.addEventListener("click",function(){
        if(seat.classList.contains("booked")) return;

        document.querySelectorAll(".seat").forEach(s=>s.classList.remove("selected"));
        seat.classList.add("selected");
        selectedSeat=i;
    });

    busLayout.appendChild(seat);
}

// Form Submit
document.getElementById("ticketForm").addEventListener("submit",function(e){
    e.preventDefault();

    if(!selectedSeat){
        alert("Please select a seat!");
        return;
    }

    let name=document.getElementById("name").value;
    let age=Number(document.getElementById("age").value);
    let gender=document.getElementById("gender").value;
    let destinationSelect=document.getElementById("destination");

    let basePrice=Number(destinationSelect.value);
    let destinationText=destinationSelect.options[destinationSelect.selectedIndex].text;

    let finalPrice=basePrice;
    let discount="Full Ticket";

    if(age<=5 && age>0){
        finalPrice=0;
        discount="Free Ride";
    }
    else if(age>5 && age<=8){
        finalPrice=basePrice*0.5;
        discount="50% Discount";
    }
    else if(age>65){
        finalPrice=basePrice*0.7;
        discount="30% Senior Discount";
    }

    if(gender==="Female" && age>=9){
        finalPrice=basePrice*0.5;
        discount="50% Special Discount";
    }

    let ticketNo="BUS-"+Math.floor(Math.random()*100000);
    let dateTime=new Date().toLocaleString();

    document.getElementById("ticketResult").innerHTML=`
        <strong>Ticket No:</strong> ${ticketNo}<br>
        <strong>Date:</strong> ${dateTime}<br><br>
        <strong>Name:</strong> ${name}<br>
        <strong>Age:</strong> ${age}<br>
        <strong>Gender:</strong> ${gender}<br>
        <strong>Destination:</strong> ${destinationText}<br>
        <strong>Seat:</strong> ${selectedSeat}<br>
        <strong>Status:</strong> ${discount}<br>
        <strong>Price:</strong> Rs ${finalPrice}
    `;

    // QR Generate
    document.getElementById("qrcode").innerHTML="";
    new QRCode(document.getElementById("qrcode"),{
        text:`Ticket:${ticketNo}, Name:${name}, Seat:${selectedSeat}`,
        width:120,
        height:120
    });

    // Mark seat booked
    document.querySelectorAll(".seat")[selectedSeat-1].classList.add("booked");

    // Switch View
    document.getElementById("formBox").style.display="none";
    document.getElementById("ticketPage").style.display="block";
});

// Back
function goBack(){
    document.getElementById("ticketPage").style.display="none";
    document.getElementById("formBox").style.display="block";
}

</script>

</body>
</html>
